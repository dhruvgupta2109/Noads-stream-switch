<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NoAds Test Music Tab</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f5f1e8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        display: grid;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        letter-spacing: 0;
      }

      audio {
        width: 100%;
      }

      button {
        width: max-content;
        min-height: 40px;
        padding: 0 16px;
        border: 1px solid #b7c0ca;
        border-radius: 6px;
        background: white;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Music Tab</h1>
      <audio id="music" controls loop></audio>
      <button id="prime">Prime Audio</button>
    </main>

    <script>
      const audio = document.querySelector("#music");
      audio.src = makeToneUrl();
      document.querySelector("#prime").addEventListener("click", () => {
        audio.volume = 0.4;
        audio.play();
      });

      function makeToneUrl() {
        const sampleRate = 44100;
        const seconds = 2;
        const samples = sampleRate * seconds;
        const bytes = new ArrayBuffer(44 + samples * 2);
        const view = new DataView(bytes);

        writeString(view, 0, "RIFF");
        view.setUint32(4, 36 + samples * 2, true);
        writeString(view, 8, "WAVE");
        writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, "data");
        view.setUint32(40, samples * 2, true);

        for (let i = 0; i < samples; i += 1) {
          const envelope = 0.25 + Math.sin((i / samples) * Math.PI) * 0.5;
          const value = Math.sin((i * 2 * Math.PI * 220) / sampleRate) * envelope * 0.35;
          view.setInt16(44 + i * 2, value * 32767, true);
        }

        return URL.createObjectURL(new Blob([view], { type: "audio/wav" }));
      }

      function writeString(view, offset, text) {
        for (let i = 0; i < text.length; i += 1) {
          view.setUint8(offset + i, text.charCodeAt(i));
        }
      }
    </script>
  </body>
</html>
